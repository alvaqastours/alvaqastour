backend:
  name: git-gateway
  branch: main   # Replace with your GitHub branch

media_folder: "assets/images"     # Folder where uploaded images are stored
public_folder: "/assets/images"   # Public path for images

site_url: "https://alvaqastours.com" 

collections:
  - name: "pages"
    label: "Pages"
    files:
      - label: "Packages Page"
        name: "packages"
        file: "packages.html"
        fields:
          - { label: "Page Title", name: "title", widget: "string" }
          - { label: "Header Image", name: "header_image", widget: "image", required: false }
          - { label: "Content", name: "body", widget: "markdown" }

      - label: "Services Page"
        name: "services"
        file: "services.html"
        fields:
          - { label: "Page Title", name: "title", widget: "string" }
          - { label: "Header Image", name: "header_image", widget: "image", required: false }
          - { label: "Content", name: "body", widget: "markdown" }
